name: Devops CI Pipeline

#When does this run?
on:
    push:
        branches: [ main ]
        paths:
            - 'devops-project-3.1/**'  #only run when this folder changes
    pull_request:
        branches: [ main ]
        paths:
            - 'devops-project-3.1/**'
defaults:
  run:
    working-directory: devops-project-3.1

#what does it do?
jobs:
    test:
        name: Run Tests
        runs-on: ubuntu-latest

        steps:
            #step 1: Get the code
            - name: Chekout code
              uses: actions/checkout@v3

            #step 2: Setup Python
            - name: Setup Python
              uses: actions/setup-python@v4
              with:
                python-version: '3.11'
            #step 3: Install dependencies
            - name: Install dependencies
              run: pip install flask psycopg2-binary

            #step 4: Run tests
            - name: Run Tests
              run: |
               echo "Test passed"
               python -c "from app.app import app; print('App imports OK')"

            #step 5: Print success
            - name: Done
              run: echo "All test passed -ready to build"
    build-and-push:
       name: Build & push Docker image
       runs-on: ubuntu-latest
       needs: test  #only run when test job passes
       steps:
        - name: checkout code
          uses: actions/checkout@v3

        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with: 
           username: ${{ secrets.DOCKER_USERNAME }}
           password: ${{ secrets.DOCKER_PASSWORD }}

        - name: Build and Push Docker image
          run: |
           docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:latest .
           docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ github.sha }} .
           docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:latest
           docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ github.sha }}

        - name: Build and Push completed
          run: echo "Image Build and Push completed successfully"

    deploy:
        name: Deploy to remote server
        runs-on: ubuntu-latest
        needs: build-and-push  #only run when build-and-push job passes
        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.0.0
              with:
                host: ${{ secrets.EC2_HOST }}
                username: ${{ secrets.EC2_USER }}
                key: ${{ secrets.EC2_SSH_KEY }}
                script: |
                  cd ~/devops-project-3.1
                  docker pull ${{ secrets.DOCKER_USERNAME }}/devops-app:latest
                  docker compose down
                  DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} docker compose up -d 
                  echo "Deployment completed successfully"
                  
      
        

           
    
        

            
