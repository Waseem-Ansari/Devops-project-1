name: Devops CI Pipeline

#When does this run?
on:
    push:
        branches: [ main ]
        paths:
            - 'devops-project-3.1/**'  #only run when this folder changes
    pull_request:
        branches: [ main ]
        paths:
            - 'devops-project-3.1/**'
defaults:
  run:
    working-directory: devops-project-3.1

#what does it do?
jobs:
    test:
        name: Run Tests
        runs-on: ubuntu-latest

        steps:
            #step 1: Get the code
            - name: Chekout code
              uses: actions/checkout@v3

            #step 2: Setup Python
            - name: Setup Python
              uses: actions/setup-python@v4
              with:
                python-version: '3.11'
            #step 3: Install dependencies
            - name: Install dependencies
              run: pip install flask psycopg2-binary

            #step 4: Run tests
            - name: Run Tests
              run: |
               echo "Test passed"
               python -c "from app.app import app; print('App imports OK')"

            #step 5: Print success
            - name: Done
              run: echo "All test passed -ready to build"
    build-and-push:
       name: Build & push Docker image
       runs-on: ubuntu-latest
       needs: test  #only run when test job passes
       steps:
        - name: checkout code
          uses: actions/checkout@v3

        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with: 
           username: ${{ secrets.DOCKER_USERNAME }}
           password: ${{ secrets.DOCKER_PASSWORD }}

        - name: Build and Push Docker image
          run: |
           docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:latest .
           docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ github.sha }} .
           docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:latest
           docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ github.sha }}

        - name: Build and Push completed
          run: echo "Image Build and Push completed successfully"

    deploy:
        name: Deploy to remote server
        runs-on: ubuntu-latest
        needs: build-and-push  #only run when build-and-push job passes
        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.0.0
              with:
                host: ${{ secrets.EC2_HOST }}
                username: ${{ secrets.EC2_USER }}
                key: ${{ secrets.EC2_SSH_KEY }}
                script: |
                  set -e  
                  # explicitly go to correct folder
                  cd ~/Devops-project-1/devops-project-3.1
                  # Verify docker-compose.yml exists
                  ls docker-compose.yml
                  #pull and deploy
                  docker pull ${{ secrets.DOCKER_USERNAME }}/devops-app:latest
                  DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} docker compose down
                  DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} docker compose up -d 
                  
                  #verify container is actually running
                  docker compose ps
                  echo "Deployment completed successfully"

    notify-staging:
     name: Slack Notification
     runs-on: ubuntu-latest
     needs: deploy
     #always() means this job runs regardless of previous job result
     if: always()
     steps:
       - name: Notify Success
         if: ${{ needs.deploy.result == 'success' }}
         uses: slackapi/slack-github-action@v1.24.0
         with:
            payload: |
             { 
               "text": "Production Deployed Successfully!",
               "attachments": [
               {
                 "color": "good",
                 "fields": [
                   {
                     "title": "Branch",
                     "value": "${{ github.ref_name }}",
                     "short": true
                    },

                    {
                     "title": "Deployed By",
                     "value": "${{ github.actor }}",
                     "short": true
                    },

                    {
                     "title": "Commit Message",
                     "value": "${{ github.event.head_commit.message }}",
                     "short": false
                    },

                    {
                     "title": "Pipeline",
                     "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs${{ github.run_id}}",
                     "short": false
                    }
                   ]
                  }
                 ]  
                }
         env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
      #send failure message if deploy failed
       - name: Notify Success
         if: ${{ needs.deploy.result == 'failure' }}
         uses: slackapi/slack-github-action@v1.24.0
         with:
            payload: |
             { 
               "text": "Production Deployment FAILED!",
               "attachments": [
               {
                 "color": "danger",
                 "fields": [
                   {
                     "title": "Branch",
                     "value": "${{ github.ref_name }}",
                     "short": true
                    },

                    {
                     "title": "Triggered By",
                     "value": "${{ github.actor }}",
                     "short": true
                    },

                    {
                     "title": "Commit Message",
                     "value": "${{ github.event.head_commit.message }}",
                     "short": false
                    },

                    {
                     "title": "Pipeline",
                     "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs${{ github.run_id}}",
                     "short": false
                    }
                   ]
                  }
                 ]  
                }
         env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
      
