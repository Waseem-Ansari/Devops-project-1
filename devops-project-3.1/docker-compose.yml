version: '3.8'
 
services:
 
  postgres-staging:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: myapp_staging
    volumes:
      - staging-db-data:/var/lib/postgresql/data
    networks:
      - staging-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
 
  flask-staging:
    image: ${DOCKER_USERNAME}/devops-app:staging
    environment:
      APP_ENV: ${APP_ENV}
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    networks:
      - staging-net
    depends_on:
      postgres-staging:
        condition: service_healthy
 
  nginx-staging:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - staging-net
    depends_on:
      - flask-staging
 
volumes:
  staging-db-data:
 
networks:
  staging-net:
    driver: bridge
